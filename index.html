<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUBED — 3D Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="shell">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <span></span><span></span>
        <span></span><span></span>
      </div>
      <div class="logo-text">
        Cubed
        <em>3D Tic Tac Toe</em>
      </div>
    </div>
    <div class="badge">v1.0</div>
  </header>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card x-card active-card" id="x-card">
      <div class="score-label"><span class="dot"></span> Player</div>
      <div class="score-val" id="score-x">0</div>
      <div class="score-name" id="x-name">X</div>
    </div>
    <div class="score-divider">vs</div>
    <div class="score-card o-card" id="o-card">
      <div class="score-label"><span class="dot"></span> Player</div>
      <div class="score-val" id="score-o">0</div>
      <div class="score-name" id="o-name">O</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <select class="mode-select" id="mode">
      <option value="2p">2 Players</option>
      <option value="easy">AI — Easy</option>
      <option value="medium">AI — Medium</option>
      <option value="hard">AI — Impossible</option>
    </select>
    <button class="reset-btn" id="reset">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 7a6 6 0 1 0 1.2-3.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M1 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      New Game
    </button>
  </div>

  <!-- Status -->
  <div class="status-wrap">
    <div id="status" class="x-turn">X — Your Turn</div>
  </div>

  <!-- Turn bar -->
  <div class="turn-bar">
    <div class="turn-bar-fill" id="turn-bar"></div>
  </div>

  <!-- Game board -->
  <div class="board3D">
    <div class="board" id="board">
      <!-- 9 cubes generated by JS -->
    </div>
  </div>

  <footer>Tap a cube to play &nbsp;·&nbsp; Flip to reveal</footer>

</div>

<script src="script.js"></script>
</body>
</html>
